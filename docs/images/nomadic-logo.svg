<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" width="600" height="340">
  <!-- Sun circle (behind mountains) -->
  <circle cx="390" cy="72" r="52" fill="#D4A843"/>

  <!-- Mountains -->
  <g fill="none" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round" stroke-linejoin="round">
    <!-- Left mountain (larger) -->
    <polyline points="135,195 240,45 345,195"/>
    <!-- Left mountain inner -->
    <polyline points="185,195 240,105 295,195"/>

    <!-- Right mountain (larger) -->
    <polyline points="255,195 360,45 465,195"/>
    <!-- Right mountain inner -->
    <polyline points="305,195 360,105 415,195"/>
  </g>

  <!-- Horizontal lines below mountains -->
  <g stroke="#1A1A1A" stroke-width="5" stroke-linecap="round">
    <line x1="115" y1="200" x2="485" y2="200"/>
    <line x1="135" y1="212" x2="465" y2="212"/>
    <line x1="195" y1="224" x2="405" y2="224"/>
  </g>

  <!-- Text: NOMADIC OFF-GRID -->
  <text x="300" y="280" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="52" font-weight="900" fill="#1A1A1A" letter-spacing="3">NOMADIC OFF-GRID</text>

  <!-- Text: SOLUTIONS -->
  <text x="300" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="30" font-weight="400" fill="#1A1A1A" letter-spacing="8">SOLUTIONS</text>
</svg>
